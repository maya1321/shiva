    <section>
        <h2>Biografia di Andrea Arrigoni</h2>
        <p>Andrea Arrigoni, classe 1999, è un rapper italiano noto con il nome d'arte Shiva. Cresciuto a Rozzano, Milano, ha iniziato la carriera nel 2014 con il mixtape e il primo EP "La via del guerriero". Con lo stile melodico e i testi autobiografici, ha raggiunto il grande pubblico con l'album di debutto "Tempo anima" (2017) e successivamente con "Dolce vita" (2021) e "Milano Demons" (2022). Nel 2020 ha ottenuto un grande successo con il singolo "Auto blu" insieme a Eiffel 65, consolidando la sua presenza nella scena trap/urban italiana.</p>
